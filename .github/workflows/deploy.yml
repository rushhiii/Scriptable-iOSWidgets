name: Docs Site CI

on:
  pull_request:
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy.yml'
  push:
    branches:
      - main
    paths:
      - 'docs-site/**'
      - '.github/workflows/deploy.yml'

permissions:
  contents: read

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: 'docs-site'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'docs-site/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
