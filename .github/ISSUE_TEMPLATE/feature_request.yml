name: Feature request
description: Suggest a new widget, enhancement, or repository improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: dropdown
    id: proposal_type
    attributes:
      label: Proposal type
      options:
        - New widget
        - Existing widget enhancement
        - Documentation improvement
        - Developer experience / repo tooling
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the behavior you want.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: textarea
    id: scope
    attributes:
      label: Scope and impact
      description: Mention affected widgets, parameters, APIs, or docs pages.
